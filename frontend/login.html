<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halleyx · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0b1120 0%, #1a2639 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      padding: 40px 32px;
      width: 360px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .login-card h2 {
      color: white;
      font-weight: 600;
      font-size: 28px;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
      text-align: center;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      color: #a0afbe;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .input-group input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1px solid #2d3a4f;
      border-radius: 16px;
      padding: 14px 18px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }
    .input-group input:focus {
      border-color: #3b82f6;
      background: rgba(59,130,246,0.1);
    }
    button {
      width: 100%;
      background: #2563eb;
      border: none;
      border-radius: 40px;
      padding: 16px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.15s;
      margin-top: 12px;
      box-shadow: 0 8px 20px -5px #1e3a8a;
    }
    button:hover { background: #1d4ed8; transform: scale(1.01); }
  </style>
</head>
<body>
  <div class="login-card">
    <h2> Halleyx</h2>
    <div class="input-group">
      <label>Username</label>
      <input id="username" placeholder="admin" autocomplete="off">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>
    <button onclick="login()">Sign in</button>
  </div>

  <script>
    async function login() {
      const user = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };
      try {
        const res = await fetch('http://localhost:8080/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user)
        });
        if (res.ok) {
          localStorage.setItem('logged', 'true');
          window.location.href = 'index.html';
        } else {
          alert('Invalid credentials');
        }
      } catch (err) {
        alert('Server unreachable – use demo (any user/pass)');
        localStorage.setItem('logged', 'true');
        window.location.href = 'index.html';
      }
    }
    // demo: press Enter on password field
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
